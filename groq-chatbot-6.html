<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#00d4aa">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MY AI">
<link rel="manifest" href="data:application/json,%7B%0A%20%20%22name%22%3A%20%22MY%20AI%22%2C%0A%20%20%22short_name%22%3A%20%22MY%20AI%22%2C%0A%20%20%22description%22%3A%20%22%EB%82%B4%20AI%20%EC%B1%97%EB%B4%87%22%2C%0A%20%20%22start_url%22%3A%20%22./%22%2C%0A%20%20%22display%22%3A%20%22standalone%22%2C%0A%20%20%22background_color%22%3A%20%22%230a0a0f%22%2C%0A%20%20%22theme_color%22%3A%20%22%2300d4aa%22%2C%0A%20%20%22icons%22%3A%20%5B%0A%20%20%20%20%7B%0A%20%20%20%20%20%20%22src%22%3A%20%22data%3Aimage/svg%2Bxml%2C%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2720%27%20fill%3D%27%25230a0a0f%27/%3E%3Ctext%20y%3D%2775%27%20x%3D%2750%27%20text-anchor%3D%27middle%27%20font-size%3D%2760%27%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E%22%2C%0A%20%20%20%20%20%20%22sizes%22%3A%20%22192x192%22%2C%0A%20%20%20%20%20%20%22type%22%3A%20%22image/svg%2Bxml%22%0A%20%20%20%20%7D%0A%20%20%5D%0A%7D">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00d4aa; --accent-dim: rgba(0,212,170,0.1);
    --text: #e8e8f0; --text-muted: #5a5a7a; --radius: 16px;
  }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #key-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; padding:24px; overflow-y:auto; }
  .key-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px 28px; width:100%; max-width:420px; text-align:center; }
  .key-box .icon { font-size:36px; margin-bottom:12px; }
  .key-box h2 { font-size:18px; font-weight:600; margin-bottom:6px; }
  .key-box p { font-size:13px; color:var(--text-muted); line-height:1.6; margin-bottom:20px; }
  .key-box p a { color:var(--accent); text-decoration:none; }
  .field-label { text-align:left; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:5px; }
  .key-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:12px; padding:11px 13px; outline:none; margin-bottom:12px; transition:border-color 0.2s; }
  .key-input:focus { border-color:var(--accent); }
  .key-input::placeholder { color:var(--text-muted); }
  #model-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; padding:11px 13px; outline:none; margin-bottom:12px; cursor:pointer; }
  .toggle-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; text-align:left; }
  .toggle-row label { font-size:13px; color:var(--text); flex:1; cursor:pointer; }
  .toggle-row small { font-size:11px; color:var(--text-muted); display:block; }
  .toggle { width:36px; height:20px; background:var(--border); border-radius:10px; position:relative; cursor:pointer; border:none; flex-shrink:0; transition:background 0.2s; }
  .toggle.on { background:var(--accent); }
  .toggle::after { content:''; position:absolute; width:14px; height:14px; background:#fff; border-radius:50%; top:3px; left:3px; transition:left 0.2s; }
  .toggle.on::after { left:19px; }
  #tavily-field { display:none; }
  #start-btn { width:100%; background:var(--accent); color:#0a0a0f; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity 0.2s; }
  #start-btn:hover { opacity:0.85; }
  .key-note { margin-top:12px; font-size:11px; color:var(--text-muted); }

  header { display:flex; align-items:center; gap:6px; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .logo-dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
  header h1 { font-size:15px; font-weight:600; }
  #model-badge { font-size:10px; color:var(--accent); font-family:'JetBrains Mono',monospace; background:var(--accent-dim); border:1px solid var(--accent); padding:3px 8px; border-radius:6px; }
  #web-badge { font-size:10px; color:#f0a500; background:rgba(240,165,0,0.1); border:1px solid #f0a500; padding:3px 8px; border-radius:6px; display:none; }
  #web-badge.on { display:inline; }
  #spacer { margin-left:auto; }
  .hbtn { background:none; border:1px solid var(--border); color:var(--text-muted); font-size:11px; padding:4px 9px; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; transition:border-color 0.2s,color 0.2s; }
  .hbtn:hover { border-color:var(--accent); color:var(--accent); }
  .hbtn.danger:hover { border-color:#ff5f5f; color:#ff5f5f; }

  #chat { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:14px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  #chat::-webkit-scrollbar { width:4px; }
  #chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  #empty { margin:auto; text-align:center; color:var(--text-muted); }
  #empty .big { font-size:40px; margin-bottom:12px; }
  #empty p { font-size:13px; line-height:1.7; }
  #empty p strong { color:var(--accent); }

  .msg { display:flex; gap:10px; max-width:720px; width:100%; }
  .msg.user { flex-direction:row-reverse; align-self:flex-end; }
  .msg.ai { align-self:flex-start; }
  .avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; margin-top:2px; font-weight:600; }
  .msg.user .avatar { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent); }
  .msg.ai .avatar { background:var(--border); color:var(--text-muted); }
  .bubble { padding:11px 15px; border-radius:var(--radius); line-height:1.7; max-width:calc(100% - 40px); white-space:pre-wrap; word-break:break-word; }
  .msg.user .bubble { background:#151525; border:1px solid var(--accent); border-top-right-radius:4px; }
  .msg.ai .bubble { background:#111118; border:1px solid var(--border); border-top-left-radius:4px; }
  .thinking .bubble, .searching .bubble { display:flex; align-items:center; gap:8px; font-size:13px; }
  .searching .bubble { color:#f0a500; }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 1.2s ease-in-out infinite; }
  .searching .dot { background:#f0a500; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes blink { 0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)} }
  .sources { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted); }
  .sources a { color:var(--accent); text-decoration:none; display:block; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  footer { padding:12px 16px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  #system-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  #system-toggle { font-size:11px; color:var(--text-muted); background:none; border:1px solid var(--border); padding:3px 9px; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; transition:border-color 0.2s,color 0.2s; }
  #system-toggle:hover { border-color:var(--accent); color:var(--accent); }
  #system-panel { display:none; margin-bottom:8px; }
  #system-panel.open { display:block; }
  #system-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Inter',sans-serif; font-size:13px; padding:9px 12px; resize:vertical; min-height:60px; outline:none; transition:border-color 0.2s; }
  #system-input:focus { border-color:var(--accent); }
  #system-input::placeholder { color:var(--text-muted); }
  .input-row { display:flex; align-items:flex-end; gap:10px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; transition:border-color 0.2s; }
  .input-row:focus-within { border-color:var(--accent); }
  #input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; resize:none; max-height:140px; overflow-y:auto; scrollbar-width:none; }
  #input::placeholder { color:var(--text-muted); }
  #input::-webkit-scrollbar { display:none; }
  #send { width:34px; height:34px; border-radius:10px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.2s,transform 0.1s; }
  #send:hover{opacity:0.85} #send:active{transform:scale(0.94)} #send:disabled{opacity:0.3;cursor:not-allowed}
  #send svg { width:16px; height:16px; fill:#0a0a0f; }
  .hint { text-align:center; font-size:11px; color:var(--text-muted); margin-top:8px; font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>

<div id="key-screen">
  <div class="key-box">
    <div class="icon">🤖</div>
    <h2>MY AI 시작하기</h2>
    <p><a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>에서 무료 Groq 키 발급</p>
    <div class="field-label">Groq API 키</div>
    <input id="key-input" class="key-input" type="password" placeholder="gsk_xxxxxxxxxxxxxxxx" />
    <div class="field-label">모델 선택</div>
    <select id="model-select">
      <option value="llama-3.1-8b-instant">Llama 3.1 8B — 빠름 (추천)</option>
      <option value="llama3-70b-8192">Llama 3 70B — 똑똑함</option>
      <option value="gemma2-9b-it">Gemma 2 9B — Google 모델</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B — 긴 대화</option>
    </select>
    <div class="toggle-row">
      <div style="flex:1">
        <label><strong>🌐 웹 검색</strong></label>
        <small>필요할 때만 자동 검색 · Tavily 키 필요</small>
      </div>
      <button class="toggle" id="search-toggle"></button>
    </div>
    <div id="tavily-field">
      <div class="field-label">Tavily API 키 <a href="https://tavily.com" target="_blank" style="font-size:10px;margin-left:4px">무료 발급 →</a></div>
      <input id="tavily-input" class="key-input" type="password" placeholder="tvly-xxxxxxxxxxxxxxxx" />
    </div>
    <button id="start-btn">시작하기 →</button>
    <div class="key-note">🔒 키는 브라우저에만 저장 · 최근 20개 대화만 전송</div>
  </div>
</div>

<header>
  <div class="logo-dot"></div>
  <h1>MY AI</h1>
  <span id="model-badge">-</span>
  <span id="web-badge">🌐 검색</span>
  <span id="spacer"></span>
  <button class="hbtn" id="save-btn">💾</button>
  <button class="hbtn" id="load-btn">📂</button>
  <button class="hbtn danger" id="clear-btn">🗑</button>
  <button class="hbtn danger" id="reset-btn">🔑</button>
  <input type="file" id="file-input" accept=".txt" style="display:none">
</header>

<div id="chat">
  <div id="empty">
    <div class="big">🤖</div>
    <p>이건 <strong>내 AI</strong>야!<br>Groq 오픈소스 모델</p>
  </div>
</div>

<footer>
  <div id="system-row">
    <button id="system-toggle">⚙ 시스템 프롬프트</button>
  </div>
  <div id="system-panel">
    <textarea id="system-input">너는 무조건 한국어로만 대답해. 어떤 언어로 질문을 받아도 항상 한국어로만 응답해.</textarea>
  </div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="메시지를 입력하세요..."></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Enter 전송 · Shift+Enter 줄바꿈</div>
</footer>

<script>
  const MAX_HISTORY = 20;
  let apiKey='', tavilyKey='', model='', useSearch=false, history=[];

  const keyScreen=document.getElementById('key-screen');
  const keyInput=document.getElementById('key-input');
  const tavilyInput=document.getElementById('tavily-input');
  const modelSelect=document.getElementById('model-select');
  const startBtn=document.getElementById('start-btn');
  const searchToggle=document.getElementById('search-toggle');
  const tavilyField=document.getElementById('tavily-field');
  const modelBadge=document.getElementById('model-badge');
  const webBadge=document.getElementById('web-badge');
  const resetBtn=document.getElementById('reset-btn');
  const saveBtn=document.getElementById('save-btn');
  const loadBtn=document.getElementById('load-btn');
  const fileInput=document.getElementById('file-input');
  const clearBtn=document.getElementById('clear-btn');
  const chatEl=document.getElementById('chat');
  const inputEl=document.getElementById('input');
  const sendBtn=document.getElementById('send');
  const systemToggle=document.getElementById('system-toggle');
  const systemPanel=document.getElementById('system-panel');
  const systemInput=document.getElementById('system-input');

  // 저장값 복원
  keyInput.value=localStorage.getItem('groq_key')||'';
  tavilyInput.value=localStorage.getItem('tavily_key')||'';
  const sm=localStorage.getItem('groq_model'); if(sm) modelSelect.value=sm;
  if(localStorage.getItem('use_search')==='1'){
    useSearch=true; searchToggle.classList.add('on'); tavilyField.style.display='block';
  }

  searchToggle.addEventListener('click',()=>{
    useSearch=!useSearch;
    searchToggle.classList.toggle('on',useSearch);
    tavilyField.style.display=useSearch?'block':'none';
  });

  startBtn.addEventListener('click',()=>{
    const k=keyInput.value.trim();
    if(!k){keyInput.style.borderColor='#ff5f5f';return;}
    if(useSearch&&!tavilyInput.value.trim()){tavilyInput.style.borderColor='#ff5f5f';return;}
    apiKey=k; tavilyKey=tavilyInput.value.trim(); model=modelSelect.value;
    localStorage.setItem('groq_key',k);
    localStorage.setItem('tavily_key',tavilyKey);
    localStorage.setItem('groq_model',model);
    localStorage.setItem('use_search',useSearch?'1':'0');
    keyScreen.style.display='none';
    modelBadge.textContent=model.split('-').slice(0,3).join('-');
    if(useSearch) webBadge.classList.add('on');
    loadHistory();
  });

  keyInput.addEventListener('keydown',e=>{if(e.key==='Enter')startBtn.click();});

  resetBtn.addEventListener('click',()=>{
    if(!confirm('설정 초기화할까?'))return;
    ['groq_key','tavily_key','groq_model','use_search','groq_history'].forEach(k=>localStorage.removeItem(k));
    location.reload();
  });

  saveBtn.addEventListener('click',()=>{
    if(!history.length){alert('저장할 대화가 없어!');return;}
    const txt=history.map(m=>`[${m.role==='user'?'나':'AI'}]\n${m.content}\n`).join('\n');
    const a=Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'})),
      download:`chat_${new Date().toISOString().slice(0,10)}.txt`
    });
    a.click();
  });

  loadBtn.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const blocks=ev.target.result.split(/\n(?=\[나\]|\[AI\])/);
      const loaded=blocks.flatMap(b=>{
        const isU=b.startsWith('[나]'),isA=b.startsWith('[AI]');
        if(!isU&&!isA)return[];
        const content=b.replace(/^\[나\]\n|^\[AI\]\n/,'').trim();
        return content?[{role:isU?'user':'assistant',content}]:[];
      });
      if(!loaded.length){alert('대화를 찾을 수 없어!');return;}
      history=loaded; saveHistory();
      chatEl.innerHTML='';
      history.forEach(m=>addMsg(m.role==='user'?'user':'ai',m.content));
      alert(`${loaded.length}개 불러왔어!`);
    };
    reader.readAsText(file); fileInput.value='';
  });

  clearBtn.addEventListener('click',()=>{
    if(!confirm('대화 초기화할까?'))return;
    history=[]; localStorage.removeItem('groq_history');
    chatEl.innerHTML=`<div id="empty"><div class="big">🤖</div><p>이건 <strong>내 AI</strong>야!<br>Groq 오픈소스 모델</p></div>`;
  });

  systemToggle.addEventListener('click',()=>systemPanel.classList.toggle('open'));
  inputEl.addEventListener('input',()=>{
    inputEl.style.height='auto';
    inputEl.style.height=Math.min(inputEl.scrollHeight,140)+'px';
  });
  inputEl.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  });
  sendBtn.addEventListener('click',sendMessage);

  function loadHistory(){
    try{
      const s=localStorage.getItem('groq_history');
      if(!s)return;
      history=JSON.parse(s);
      history.forEach(m=>addMsg(m.role==='user'?'user':'ai',m.content));
    }catch(e){history=[];}
  }
  function saveHistory(){ localStorage.setItem('groq_history',JSON.stringify(history)); }

  function addMsg(role,text,mode=''){
    document.getElementById('empty')?.remove();
    const wrap=document.createElement('div');
    wrap.className=`msg ${role}${mode?' '+mode:''}`;
    const av=document.createElement('div'); av.className='avatar';
    av.textContent=role==='user'?'나':'AI';
    const bubble=document.createElement('div'); bubble.className='bubble';
    if(mode==='thinking'){
      bubble.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    } else if(mode==='searching'){
      bubble.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div><span>웹 검색 중...</span>';
    } else {
      bubble.textContent=text;
    }
    wrap.appendChild(av); wrap.appendChild(bubble);
    chatEl.appendChild(wrap); chatEl.scrollTop=chatEl.scrollHeight;
    return {wrap,bubble};
  }

  // 검색 필요 여부 판단 (AI한테 먼저 물어봄)
  async function needsSearch(userMsg) {
    const checkRes = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({
        model,
        messages:[{
          role:'system',
          content:'너는 질문을 보고 웹 검색이 필요한지만 판단해. 최신 뉴스, 날씨, 실시간 정보, 모르는 사실이 필요하면 "YES", 일반 대화/인사/의견/이미 아는 내용이면 "NO"만 답해. 다른 말은 하지마.'
        },{
          role:'user',
          content:userMsg
        }],
        max_tokens:5,
        temperature:0
      })
    });
    const checkData = await checkRes.json();
    const answer = checkData.choices?.[0]?.message?.content?.trim().toUpperCase()||'NO';
    return answer.includes('YES');
  }

  async function doSearch(query){
    const res=await fetch('https://api.tavily.com/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:tavilyKey,query,search_depth:'basic',max_results:4})
    });
    const data=await res.json();
    return data.results||[];
  }

  async function sendMessage(){
    const text=inputEl.value.trim();
    if(!text||!apiKey)return;
    inputEl.value=''; inputEl.style.height='auto';
    sendBtn.disabled=true;

    addMsg('user',text);
    history.push({role:'user',content:text});
    saveHistory();

    const {wrap:tw}=addMsg('ai','','thinking');

    try{
      let searchResults=[];

      // 웹 검색 필요 여부 판단
      if(useSearch&&tavilyKey){
        const shouldSearch = await needsSearch(text);
        if(shouldSearch){
          tw.remove();
          const {wrap:sw}=addMsg('ai','','searching');
          try{ searchResults=await doSearch(text); }catch(e){}
          sw.remove();
          addMsg('ai','','thinking');
        }
      }

      const sys=systemInput.value.trim();
      let systemMsg = sys||'';
      if(searchResults.length){
        const ctx=searchResults.map((r,i)=>`[${i+1}] ${r.title}\n${r.url}\n${r.content}`).join('\n\n');
        systemMsg+=(systemMsg?'\n\n':'')+`아래 웹 검색 결과를 참고해서 답변해:\n\n${ctx}`;
      }

      const recentHistory=history.slice(-MAX_HISTORY);
      const messages=systemMsg?[{role:'system',content:systemMsg},...recentHistory]:recentHistory;

      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
        body:JSON.stringify({model,messages,max_tokens:1024,temperature:0.7})
      });
      const data=await res.json();

      // 기존 thinking 제거
      document.querySelector('.thinking')?.remove();

      if(data.error) throw new Error(data.error.message);

      const reply=data.choices[0].message.content;
      history.push({role:'assistant',content:reply});
      saveHistory();
      const {bubble}=addMsg('ai',reply);

      if(searchResults.length){
        const src=document.createElement('div'); src.className='sources';
        src.innerHTML='📎 출처:<br>'+searchResults.slice(0,3).map(r=>
          `<a href="${r.url}" target="_blank">${r.title||r.url}</a>`
        ).join('');
        bubble.appendChild(src);
      }

    }catch(err){
      document.querySelector('.thinking')?.remove();
      document.querySelector('.searching')?.remove();
      addMsg('ai','⚠️ 오류: '+err.message);
    }

    sendBtn.disabled=false;
    inputEl.focus();
  }
</script>

<script>
  if('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'myai-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          fetch(e.request).catch(() => caches.match(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], {type:'text/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }
</script>
</body>
